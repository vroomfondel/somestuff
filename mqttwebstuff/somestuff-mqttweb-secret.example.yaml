---
# Example only. Copy to somestuff-mqttweb-secret.local.yaml (gitignored via
# *.local.*), fill in real values and `kubectl apply -f` it.
# NEVER commit real credentials.
#
# Note: somestuff_mqttweb_deployment.yml instead maps the OEPNV_MQTT_USER/
# PASSWORD keys of the existing somestuff-oepnv-secret onto MQTTWEB_* (one
# credential pair for both pods). Use THIS secret when mqttweb should get its
# own broker account — then switch the deployment's secretKeyRef accordingly.
apiVersion: v1
kind: Secret
metadata:
  name: somestuff-mqttweb-secret
  namespace: somestuff
type: Opaque
stringData:
  # MQTT broker credentials (empty user = anonymous).
  MQTTWEB_MQTT_USER: "mqttweb"
  MQTTWEB_MQTT_PASSWORD: "CHANGE_ME"
