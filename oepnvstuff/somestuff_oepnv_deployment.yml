---
# GTFS-realtime coverage watcher: polls the RT feed in --watch mode and
# publishes per-line status to MQTT (see oepnvstuff/README.md for the topic
# layout). The pod only makes OUTBOUND connections (feed HTTP + MQTT broker) —
# no inbound service/ingress needed.
#
# Self-healing without a health endpoint: OEPNV_STOP_ON_STALE=1 makes the
# process exit (code 2) once the feed goes stale; restartPolicy Always brings
# it back up. The static feed cache lives on a volume, so a restart re-checks
# it with a conditional GET (304 -> no re-download of the ~250 MB zip).
#
# Prerequisites:
#   - namespace 'somestuff'
#   - Secret 'somestuff-oepnv-secret' (see somestuff-oepnv-secret.example.yaml)
#   - the image must contain: requests, typer, python-dotenv,
#     gtfs-realtime-bindings, mqttstuff, loguru, tabulate
apiVersion: apps/v1
kind: Deployment
metadata:
  name: somestuff-oepnv-deployment
  namespace: somestuff
  labels:
    app: somestuff-oepnv
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/pollSchedule: "@every 5m"
    keel.sh/trigger: poll
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: somestuff-oepnv
  template:
    metadata:
      labels:
        app: somestuff-oepnv
    spec:
      restartPolicy: Always
      containers:
        - name: somestuff-oepnv
          image: xomoxcc/somestuff:latest
          # The CLI is fully env-driven (OEPNV_*), so no flags are needed here.
          # SIGTERM on pod stop is handled -> clean shutdown incl. MQTT disconnect.
          command:
            - /bin/sh
            - -c
            - |
              set -e
              exec tini -- python3 -m oepnvstuff.check_realtime
          # Complete OEPNV_* env catalog (precedence: real env > oepnv.local.env;
          # booleans accept true|false or 1|0). Optional settings are commented
          # out with example values. MQTT credentials (OEPNV_MQTT_USER/PASSWORD)
          # come from the Secret via envFrom below.
          env:
            # ── feed sources (both may also be local file paths) ─────────────
            - name: OEPNV_STATIC_URL
              value: "https://download.gtfs.de/germany/nv_free/latest.zip"
            - name: OEPNV_REALTIME_URL
              value: "https://realtime.gtfs.de/realtime-free.pb"
            # ── targets ──────────────────────────────────────────────────────
            # Lines: comma/space separated. Station(s): substring match against
            # stop_name, several stations ';'-separated ("Blankenese;Ellerbek").
            - name: OEPNV_LINES
              value: "1,12,22,189"
            - name: OEPNV_STATION
              value: "Blankenese"
            # Geo filter 'lat,lon,radius_km' — disambiguates same-named stations
            # in different towns (GTFS has no postal codes). Several areas
            # ';'-separated (OR-combined). Empty/unset = off.
            # - name: OEPNV_NEAR
            #   value: "53.5633,9.8144,3;53.647,9.892,2"
            # ── static feed cache ────────────────────────────────────────────
            # Cache on the volume below so restarts reuse the static zip via 304.
            - name: OEPNV_CACHE_DIR
              value: "/cache"
            # Re-download the static zip even when the server would answer 304.
            # - name: OEPNV_FORCE_REFRESH
            #   value: "true"
            # ── watch loop ───────────────────────────────────────────────────
            # Poll loop instead of one-shot; exit 2 (-> restart) on a stale feed.
            - name: OEPNV_WATCH
              value: "true"
            - name: OEPNV_STOP_ON_STALE
              value: "true"
            # Poll interval in seconds (gtfs.de updates every ~10s).
            - name: OEPNV_INTERVAL
              value: "20"
            # Staleness: feed older than N seconds (0 = off) / N unchanged cycles.
            - name: OEPNV_MAX_AGE
              value: "120"
            - name: OEPNV_STALE_CYCLES
              value: "6"
            # ── departure board ──────────────────────────────────────────────
            # Next N departures per line+stop+direction, published (retain=False)
            # to <base>/departures and <base>/departures/<line>/<stop>/<direction>.
            - name: OEPNV_ENABLE_DEPARTURES
              value: "true"
            - name: OEPNV_DEPARTURES_COUNT
              value: "3"
            # Look-ahead window in hours.
            - name: OEPNV_DEPARTURES_HORIZON_HOURS
              value: "48"
            # ── MQTT result bridge ───────────────────────────────────────────
            - name: OEPNV_MQTT_ENABLE
              value: "true"
            - name: OEPNV_MQTT_HOST
              value: "mosquitto.mosquitto.svc.cluster.local"
            - name: OEPNV_MQTT_PORT
              value: "1883"
            - name: OEPNV_MQTT_BASE_TOPIC
              value: "oepnv"
            # TLS to the broker (default off). Enable + set port 8883; mount the
            # CA (and client cert/key for mTLS) from a Secret and point the
            # OEPNV_MQTT_TLS_CA/CERT/KEY paths at the mount. The CA must be a
            # certificate the broker actually presents (an ingress default cert
            # cannot be verified). TLS_INSECURE only skips the hostname check.
            # - name: OEPNV_MQTT_TLS
            #   value: "true"
            # - name: OEPNV_MQTT_TLS_CA
            #   value: "/tls/ca.crt"
            # - name: OEPNV_MQTT_TLS_CERT
            #   value: "/tls/client.crt"
            # - name: OEPNV_MQTT_TLS_KEY
            #   value: "/tls/client.key"
            # - name: OEPNV_MQTT_TLS_INSECURE
            #   value: "true"
            # ── misc ─────────────────────────────────────────────────────────
            # DEBUG logging.
            # - name: OEPNV_VERBOSE
            #   value: "true"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: TZ
              value: "Europe/Berlin"
          envFrom:
            - secretRef:
                name: somestuff-oepnv-secret
          volumeMounts:
            - name: gtfs-cache
              mountPath: /cache
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 5500m
              # Indexing streams the zip, but stop_times.txt is large; give headroom.
              memory: 512Mi
      volumes:
        # emptyDir survives container restarts but not pod rescheduling; swap in
        # a PVC if re-downloading the ~250 MB zip after rescheduling bothers you:
        #   persistentVolumeClaim: { claimName: somestuff-oepnv-cache }
        - name: gtfs-cache
          emptyDir:
            sizeLimit: 1Gi
