---
# Example only. Copy to somestuff-oepnv-secret.local.yaml (gitignored via
# *.local.*), fill in real values and `kubectl apply -f` it.
# NEVER commit real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: somestuff-oepnv-secret
  namespace: somestuff
type: Opaque
stringData:
  # MQTT broker credentials for the result bridge (empty user = anonymous).
  OEPNV_MQTT_USER: "oepnv"
  OEPNV_MQTT_PASSWORD: "CHANGE_ME"
