---
# Example only. Copy to somestuff-ucm6204-secret.local.yaml (gitignored via
# *.local.*), fill in real values and `kubectl apply -f` it.
# NEVER commit real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: somestuff-ucm6204-secret
  namespace: somestuff
type: Opaque
stringData:
  # HTTPS-API user (control). Needs API enabled + Call Control on the UCM.
  UCM_API_USER: "cdrapi"
  UCM_API_PASSWORD: "CHANGE_ME"
  # Web user (WebSocket events). The API user does NOT work on the WebSocket.
  UCM_WEB_USER: "webuser"
  UCM_WEB_PASSWORD: "CHANGE_ME"
